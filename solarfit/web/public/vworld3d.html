<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (async function () {
      var params  = new URLSearchParams(location.search);
      var key     = params.get('key') || '';
      var initLat = parseFloat(params.get('lat') || '37.5');
      var initLon = parseFloat(params.get('lon') || '127.0');

      if (!key) { document.body.textContent = 'API 키 없음'; return; }

      /* ── 스크립트 로더 ── */
      function loadScript(src) {
        return new Promise(function(res, rej) {
          if (document.querySelector('script[src="' + src + '"]')) { res(); return; }
          var s = document.createElement('script');
          s.src = src; s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }

      /* ── jQuery ── */
      await loadScript('https://code.jquery.com/jquery-3.7.1.min.js');

      /* ── VWorld 부트 스크립트 (document['write'] 가로채기) ── */
      var queue = [];
      var _w = document['write'].bind(document);
      document['write'] = function(html) {
        var m = html.match(/src=["']([^"']+)["']/);
        if (m) queue.push(new URL(m[1], 'https://map.vworld.kr').href);
      };
      try {
        await loadScript(
          'https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey='
          + encodeURIComponent(key)
        );
      } finally { document['write'] = _w; }
      for (var i = 0; i < queue.length; i++) { await loadScript(queue[i]); }

      if (!window.vw || !window.vw.Map) {
        document.body.textContent = 'VWorld 로드 실패 — API 키/도메인 확인';
        return;
      }

      /* ── 카메라 위치 생성 헬퍼 ── */
      function makePos(lon, lat) {
        if (!vw.CameraPosition || !vw.CoordZ || !vw.Direction) return null;
        try {
          return new vw.CameraPosition(
            new vw.CoordZ(lon, lat, 500),
            new vw.Direction(0, -80, 0)
          );
        } catch(e) { return null; }
      }

      /* ── 지도 초기화 ── */
      var initPos = makePos(initLon, initLat);
      var map = new vw.Map();
      map.setOption({
        mapId: 'map',
        initPosition: initPos,
        logo: false,
        navigation: true
      });
      map.setMapId('map');
      if (initPos) map.setInitPosition(initPos);
      if (map.setLogoVisible) map.setLogoVisible(false);
      if (map.setNavigationZoomVisible) map.setNavigationZoomVisible(false);
      map.start();

      /* ── ready 감지: vw.CameraPosition 이 실제로 동작할 때까지 폴링 ── */
      function waitReady(cb, tries) {
        tries = tries || 0;
        if (tries > 50) return; // 최대 5초
        var pos = makePos(initLon, initLat);
        if (pos) { cb(); return; }
        setTimeout(function() { waitReady(cb, tries + 1); }, 100);
      }

      waitReady(function() {
        /* 초기 위치로 이동 */
        var pos = makePos(initLon, initLat);
        if (pos) try { map.moveTo(pos); } catch(e) {}

        /* 부모에게 준비 완료 알림 */
        window.parent.postMessage({ type: 'vworld3d:ready' }, '*');
      });

      /* ── 부모로부터 flyTo 수신 ── */
      window.addEventListener('message', function(e) {
        if (!e.data || e.data.type !== 'flyTo') return;
        var pos = makePos(e.data.lon, e.data.lat);
        if (pos) try { map.moveTo(pos); } catch(e) {}
      });

    })();
  </script>
</body>
</html>
