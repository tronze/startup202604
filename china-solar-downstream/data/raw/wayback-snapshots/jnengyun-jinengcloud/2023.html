<meta name="description" content="鲸能云是一个面向新能源领域的数智化产品研发平台，由厦门中远方舟网络科技有限公司自主研发，致力于为新能源企业提供专业、智能、高效的数字化升级整体解决方案，帮助企业提升核心竞争力，持续为客户创造价值。作为以技术驱动为核心的国家高新-双软技术企业，积极服务于国家“30·60”双碳战略目标，不断探索新场景、新技术、新架构，持续推动能源领域数字化进程。">
